version: "3.9"

services:

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - patient-management-network

  auth-db:
    image: postgres:17
    container_name: auth-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - patient-management-network

  patient-db:
    image: postgres:17
    container_name: patient-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PATIENT_DB_NAME}
      POSTGRES_USER: ${PATIENT_DB_USER}
      POSTGRES_PASSWORD: ${PATIENT_DB_PASSWORD}
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    networks:
      - patient-management-network

  auth-service:
    image: auth-service:latest
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    depends_on:
      - auth-db
      - kafka
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET}

      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD}

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

    networks:
      - patient-management-network

  billing-service:
    image: billing-service:latest
    build: ./billing-service
    container_name: billing-service
    restart: unless-stopped
    depends_on:
      - kafka
    env_file:
      - .env
    ports:
      - "4001:4001"
      - "9001:9001"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - patient-management-network

  analytics-service:
    image: analytics-service:latest
    build: ./analytics-service
    container_name: analytics-service
    restart: unless-stopped
    depends_on:
      - kafka
    env_file:
      - .env
    ports:
      - "4002:4002"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    networks:
      - patient-management-network

  patient-service:
    image: patient-service:latest
    build: ./patient-service
    container_name: patient-service
    restart: unless-stopped
    depends_on:
      - patient-db
      - billing-service
      - kafka
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/${PATIENT_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${PATIENT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PATIENT_DB_PASSWORD}

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE}
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: ${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT}

      BILLING_SERVICE_ADDRESS: ${BILLING_SERVICE_ADDRESS}
      BILLING_SERVICE_GRPC_PORT: ${BILLING_SERVICE_GRPC_PORT}

      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

    networks:
      - patient-management-network

  api-gateway:
    image: api-gateway:latest
    build: ./api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
    env_file:
      - .env
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
    networks:
      patient-management-network:
          aliases:
            - api-gateway

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - patient-management-network

volumes:
  auth-db-data:
  patient-db-data:

networks:
  patient-management-network:
    driver: bridge